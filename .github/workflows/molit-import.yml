name: MOLIT 시세조회값 최신 업데이트

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Supabase molit_import_jobs id
        required: true
      city:
        description: 시도명 또는 ALL
        required: true
        default: ALL
      district:
        description: 시군구명 또는 ALL
        required: true
        default: ALL
      start_month:
        description: 시작월 YYYYMM
        required: true
      end_month:
        description: 종료월 YYYYMM
        required: true
      refresh_options:
        description: 적재 후 property_catalog_options 갱신 여부
        required: false
        default: "true"

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      MOLIT_IMPORT_JOB_ID: ${{ github.event.inputs.job_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: scripts/molit-bulk
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run MOLIT import
        working-directory: scripts/molit-bulk
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.refresh_options }}" = "true" ]; then
            ARGS="$ARGS --refresh-options"
          fi
          python bulk_pipeline_runner_nationwide_progress.py \
            --job-id "${{ github.event.inputs.job_id }}" \
            --city "${{ github.event.inputs.city }}" \
            --district "${{ github.event.inputs.district }}" \
            --start-month "${{ github.event.inputs.start_month }}" \
            --end-month "${{ github.event.inputs.end_month }}" \
            --master "../../property-master.json" \
            $ARGS
